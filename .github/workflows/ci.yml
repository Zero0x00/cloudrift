name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Tidy and Download Modules
        run: |
          go mod tidy
          go mod download

      - name: Unit tests
        run: go test ./... -race

      - name: Lint (Security Profile)
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59.1
          # The action handles caching and dependency resolution automatically,
          # fixing the "undefined: chi" and "undefined: excelize" errors.
