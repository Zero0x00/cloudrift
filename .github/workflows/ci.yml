name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Dependencies
        run: go mod tidy

      - name: Unit tests
        run: go test ./... -race
        
      - name: Download modules
        run: go mod download

      - name: Lint (Security Profile)
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.59.1
          golangci-lint run --timeout=10m --modules-download-mode=mod
