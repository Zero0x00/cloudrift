name: ci

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      
      - name: Sync dependencies
        run: go mod tidy
      
      - name: Build
        run: go build ./...
      
      - name: Test
        run: go test ./... -race
      
      - name: Force module resolution (critical)
        run: |
          go clean -modcache
          go mod download
      
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.59.1
          args: --timeout=5m --modules-download-mode=mod --build-tags=''
