version: "2"

run:
  timeout: 5m
  issues-exit-code: 1

linters:
  default: none
  enable:
    # 🔐 Core security
    - gosec
    - errcheck
    - staticcheck

    # ☁️ Reliability (prevents security bugs)
    - govet
    - ineffassign
    - bodyclose

    # 📦 Supply chain / dependency hygiene
    - depguard

    # ⚡ Code quality (high signal only)
    - revive
    - misspell
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprintf
        - os.Setenv
        - os.Unsetenv
        - (*os.File).Close
        - (io.Closer).Close
        - (*nhooyr.io/websocket.Conn).Close
        - (nhooyr.io/websocket.Conn).Close
        - (github.com/neo4j/neo4j-go-driver/v5/neo4j.DriverWithContext).Close
        - (github.com/neo4j/neo4j-go-driver/v5/neo4j.SessionWithContext).Close

    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104 # ignore unchecked errors in some cases (tune later)
        - G114 # http.ListenAndServe timeout warning handled at app boundary
        - G204 # exec.Command with dynamic URL opener
        - G301 # permissive directory modes acceptable for local artifacts
        - G304 # dynamic file paths are validated by call sites
        - G306 # file mode checks are noisy for non-secret artifacts
        - G703 # taint/path traversal false positives for curated local paths

    depguard:
      rules:
        main:
          deny:
            - pkg: "crypto/md5"
              desc: "MD5 is insecure"
            - pkg: "crypto/sha1"
              desc: "SHA1 is deprecated"
            - pkg: "math/rand"
              desc: "Use crypto/rand for security-sensitive code"

    revive:
      rules:
        - name: var-naming
        - name: error-return
    staticcheck:
      checks:
        - all
        - -QF1012 # style-only fmt.Fprintf suggestion
        - -SA1019 # deprecated websocket package is intentional for now
        - -ST1000 # package comment style enforcement
        - -ST1022 # exported const comment format style

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - bodyclose
          - errcheck
          - gosec